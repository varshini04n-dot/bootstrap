<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <title>Sweet Bakery Feedback Form</title>
</head>
<body class="bg-light">

<div class="container mt-3 mb-3">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
    
    <div class="card shadow mx-auto" >
        
        <div class="card-header bg-primary text-white text-center">
            <h3 class="mb-0">Sweet Bakery Feedback Form</h3>
        </div>

        <div class="card-body">

            <form>

                <div class="form-group">
                    <label for="name">Customer's Name</label>
                    <input type="text" class="form-control" id="name" placeholder="Enter your name">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label for="feedback">Feedback</label>
                    <textarea class="form-control" id="feedback" rows="4" placeholder="Write your feedback"></textarea>
                </div>

                <div class="form-group">
                    <label><strong>Preferred Contact Method</strong></label>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" id="contactEmail" name="contact">
                        <label class="form-check-label" for="contactEmail">
                            Email
                        </label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" id="contactPhone" name="contact">
                        <label class="form-check-label" for="contactPhone">
                            Phone
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="rating">Satisfaction Level (1–10)</label>
                    <input type="range" class="form-control-range" id="rating" min="1" max="10">
                    <div class="d-flex justify-content-between">
                        <span>1</span>
                        <span>10</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="order">Choose the Type of Order</label>
                    <select class="form-control" id="order">
                        <option selected disabled>Select an option</option>
                        <option>Cake</option>
                        <option>Cookies</option>
                        <option>Pastries</option>
                    </select>
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-primary px-4">
                        Submit
                    </button>
                </div>

            </form>
</div>
</div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>

</body>
</html>
