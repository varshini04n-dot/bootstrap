<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>
        body{
            background-color: antiquewhite;
        }
        h1{text-align: center;
          margin-top:20px;
            margin-bottom:30px;}
    </style>
</head>
<body>
    <h1>Feedback Form</h1>
    <form>
    <div class="container">
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text"class="form-control" id="name"placeholder="Enter name"name="name">
        </div>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email"class="form-control"id="email"placeholder="enter your email"name="email">
            </div>
            <div class="form-group mt-4">
  <label for="Feedback">Feedback:</label>
  <textarea class="form-control" rows="3" id="Feedback"></textarea>
</div>
<div class="form-group ">
<label for="select">How did you find the site</label>
<select class="form-control" id="select">
    <option>Google</option>
    <option>Social media</option>
    <option>Friends and Families</option>
</select>
</div>
<h5>Your Satification Level</h5>
<div class="form-check-inline">
    <label class="form-check-input">
        <input type="radio" class="form-check-label"name="op">1</label>
    
</div>
<div class="form-check-inline">
    <label class="form-check-input">
        <input type="radio" class="form-check-label"name="op">2</label>
    
</div>
<div class="form-check-inline">
    <label class="form-check-input">
        <input type="radio" class="form-check-label"name="op">3</label>
    
</div>
<div class="form-check-inline">
    <label class="form-check-input">
        <input type="radio" class="form-check-label"name="op">4</label>
    
</div>
<div class="form-check-inline">
    <label class="form-check-input">
        <input type="radio" class="form-check-label"name="op">5</label>
    
</div>
<button type="submit" class="btn btn-primary btn-block mt-4 ">
                Submit Feedback
            </button>
        
    </div>
    </form>
     <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>

</body>
</html>
