<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Progress Dashboard</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    <style>
        body{background-color:lightskyblue;}
    </style>
</head>
<body>

<div class="container text-center my-5">

    
    <h1 class="text-center mb-4">Course Progress Dashboard</h1>

    
    <ul class="breadcrumb">
        <li class="breadcrumb-item"><a href="#">Home</a></li>
        <li class="breadcrumb-item"><a href="#">Courses</a></li>
        <li class="breadcrumb-item active">Web Development</li>
    </ul>

    
    <h2 class="text-center mb-4">
        Web Development Course
        <span class="badge badge-primary">New</span>
    </h2>


    <h5>HTML</h5>
    <div class="pro">
    <div class="progress mb-3"style="height:30px;">
        <div class="progress-bar bg-success progress-bar-striped"
             style="width:100%;">
            100%
        </div>
    </div>

   
    <h5>CSS</h5>
    <div class="progress mb-3"style="height:30px;">
        <div class="progress-bar bg-info progress-bar-striped progress-bar-animated"
             style="width:75%;">
            75%
        </div>
    </div>

    
    <h5>JavaScript</h5>
    <div class="progress mb-3"style="height:30px;">
        <div class="progress-bar bg-warning"
             style="width:50%;">
            50%
        </div>
    </div>

    
    <h5>Bootstrap</h5>
    <div class="progress mb-4"style="height:30px;">
        <div class="progress-bar bg-danger"
             style="width:25%;">
            25%
        </div>
    </div>
    </div>

    
     <div class="d-flex justify-content-center mb-4">
      <div class="btn-group" role="group" aria-label="Course actions">
        <button type="button" class="btn btn-success">Start</button>
        <button type="button" class="btn btn-warning">Pause</button>
        <button type="button" class="btn btn-danger">Reset</button>
      </div>
    </div>

    
    <ul class="pagination justify-content-center">
        <li class="page-item active">
            <a class="page-link" href="#">1</a>
        </li>

        <li class="page-item">
            <a class="page-link" href="#">2</a>
        </li>

        <li class="page-item disabled">
            <a class="page-link" href="#">3</a>
        </li>
    </ul>

</div>

</body>
</html>
